appId: com.retrowebeditor.app
productName: Retro Web Editor
copyright: "Copyright (C) 2026 Jeremy Riel. Licensed under GNU GPL v3.0."

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - "!out/**/*.map"

extraResources:
  - from: copying
    to: copying
  - from: resources/icon.png
    to: icon.png

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico

mac:
  target:
    - dmg
    - zip
  icon: resources/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Development
  synopsis: "A lightweight WYSIWYG HTML editor for desktop"
  description: "Retro Web Editor — Edit HTML visually with real-time live preview"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Retro Web Editor"
  license: copying/LICENSE_GNU_GPL_3.0.txt
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  deleteAppDataOnUninstall: false

dmg:
  title: "Retro Web Editor ${version}"
  artifactName: "RetroWebEditor-${version}-mac.${ext}"

portable:
  artifactName: "RetroWebEditor-${version}-portable.${ext}"
